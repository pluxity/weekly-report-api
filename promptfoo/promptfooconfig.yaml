description: "weekly-report-api prompt regression tests"

providers:
  - id: openrouter:google/gemini-2.5-flash
    config:
      apiKey:
      # OpenRouter 대시보드에서 서버 트래픽과 구분용 (없으면 "unknown"으로 표시)
      headers:
        HTTP-Referer: "https://weekly-report-api.local/promptfoo"
        X-Title: "weekly-report promptfoo"

prompts:
  - id: intent
    label: "intent-prompt"
    raw: |
      {{intent_prompt}}
      {{history_block}}

      {{userMessage}}

  - id: system
    label: "system-prompt"
    raw: |
      {{system_prompt}}

      [INTENT]
      {{intent}}
      [/INTENT]

      [CONTEXT]
      {{context}}
      [/CONTEXT]

      [INPUT]{{userMessage}}[/INPUT]

defaultTest:
  options:
    transformVars: file://transform-vars.js

tests:
  # ──────────────────────────────────────
  # intent-prompt tests
  # ──────────────────────────────────────

  ## create
  - description: "[intent] 프로젝트 생성"
    vars:
      userMessage: "프로젝트 만들어줘"
    prompts: [intent]
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).action === 'create' && JSON.parse(output).target === 'project'"

  - description: "[intent] 이름 포함 프로젝트 생성"
    vars:
      userMessage: "PMS 프로젝트 만들어줘"
    prompts: [intent]
    assert:
      - type: is-json
      - type: javascript
        value: |
          const o = JSON.parse(output);
          return o.action === 'create' && o.target === 'project' && o.name === 'PMS';

  - description: "[intent] 태스크 생성"
    vars:
      userMessage: "태스크 만들어줘"
    prompts: [intent]
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).action === 'create' && JSON.parse(output).target === 'task'"

  - description: "[intent] 업무 그룹 생성"
    vars:
      userMessage: "업무 그룹 만들어줘"
    prompts: [intent]
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).action === 'create' && JSON.parse(output).target === 'epic'"

  ## read
  - description: "[intent] 태스크 조회"
    vars:
      userMessage: "내 태스크 보여줘"
    prompts: [intent]
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).action === 'read' && JSON.parse(output).target === 'task'"

  - description: "[intent] 리뷰 대기 조회"
    vars:
      userMessage: "리뷰할거 보여줘"
    prompts: [intent]
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).action === 'read' && JSON.parse(output).target === 'review'"

  ## review_request
  - description: "[intent] 완료 → review_request"
    vars:
      userMessage: "DB 설계 완료"
    prompts: [intent]
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).action === 'review_request' && JSON.parse(output).target === 'task'"

  - description: "[intent] 검수 요청"
    vars:
      userMessage: "API 설계 검수 요청"
    prompts: [intent]
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).action === 'review_request' && JSON.parse(output).target === 'task'"

  ## update
  - description: "[intent] 태스크 수정"
    vars:
      userMessage: "태스크 수정해줘"
    prompts: [intent]
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).action === 'update' && JSON.parse(output).target === 'task'"

  ## delete
  - description: "[intent] 프로젝트 삭제"
    vars:
      userMessage: "알파 프로젝트 삭제해줘"
    prompts: [intent]
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).action === 'delete' && JSON.parse(output).target === 'project'"

  ## assign / unassign
  - description: "[intent] 업무 그룹 배정"
    vars:
      userMessage: "대시보드 업무 그룹에 홍길동 할당해줘"
    prompts: [intent]
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).action === 'assign' && JSON.parse(output).target === 'epic'"

  - description: "[intent] 업무 그룹 배정 해제"
    vars:
      userMessage: "대시보드 업무 그룹에서 홍길동 빼줘"
    prompts: [intent]
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).action === 'unassign' && JSON.parse(output).target === 'epic'"

  ## review_request - 다른 트리거 워드
  - description: "[intent] 끝냈어 → review_request"
    vars:
      userMessage: "DB 설계 끝냈어"
    prompts: [intent]
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).action === 'review_request' && JSON.parse(output).target === 'task'"

  - description: "[intent] 다 했어 → review_request"
    vars:
      userMessage: "DB 설계 다 했어"
    prompts: [intent]
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).action === 'review_request' && JSON.parse(output).target === 'task'"

  ## create with hint
  - description: "[intent] 업무 그룹에 태스크 추가 → create + hint"
    vars:
      userMessage: "백엔드 업무 그룹에 API 설계 태스크 추가해줘"
    prompts: [intent]
    assert:
      - type: is-json
      - type: javascript
        value: |
          const o = JSON.parse(output);
          return o.action === 'create' && o.target === 'task' && o.epic === '백엔드';

  ## clarify
  - description: "[intent] 모호한 입력 → clarify"
    vars:
      userMessage: "진행중"
    prompts: [intent]
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).action === 'clarify'"

  ## 데이터 질문은 answer가 아니라 read
  - description: "[intent] PM 누구야 → read project (answer 아님)"
    vars:
      userMessage: "용인 플랫폼 PM 누구야"
    prompts: [intent]
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).action === 'read' && JSON.parse(output).target === 'project'"

  - description: "[intent] 마감 언제야 → read task (answer 아님)"
    vars:
      userMessage: "크롤러 개발 마감 언제야?"
    prompts: [intent]
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).action === 'read' && JSON.parse(output).target === 'task'"

  ## answer
  - description: "[intent] 개념 질문 → answer"
    vars:
      userMessage: "태스크가뭔데"
    prompts: [intent]
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).action === 'answer'"

  - description: "[intent] 기능 문의 → answer"
    vars:
      userMessage: "뭘 할 수 있어?"
    prompts: [intent]
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).action === 'answer'"

  - description: "[intent] 시작 안내 문의 → answer"
    vars:
      userMessage: "뭐부터 하면 돼?"
    prompts: [intent]
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).action === 'answer'"

  - description: "[intent] 할 일 문의 → answer"
    vars:
      userMessage: "나 뭐해야해?"
    prompts: [intent]
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).action === 'answer'"

  - description: "[intent] 불만·욕설 → answer"
    vars:
      userMessage: "진짜멍청하네"
    prompts: [intent]
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).action === 'answer'"

  - description: "[intent] 지시어성 발화 → answer"
    vars:
      userMessage: "따라하지말고"
    prompts: [intent]
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).action === 'answer'"

  - description: "[intent] 범위 밖 요청 → answer"
    vars:
      userMessage: "이 PMS를 폭파시키고싶어"
    prompts: [intent]
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).action === 'answer'"

  ## team
  - description: "[intent] 팀 조회"
    vars:
      userMessage: "팀 보여줘"
    prompts: [intent]
    assert:
      - type: is-json
      - type: javascript
        value: "JSON.parse(output).action === 'read' && JSON.parse(output).target === 'team'"

  # ──────────────────────────────────────
  # intent-prompt history tests
  # ──────────────────────────────────────

  ## 히스토리 참조 - 이전 create 결과의 id를 이어받아 update
  - description: "[intent-history] 아까 만든거 수정 → update + id 참조"
    vars:
      userMessage: "아까 만든거 마감일을 금요일로"
      history: "--- 히스토리 #1 | 질문: 로그인 태스크 만들어줘 | target: task | action: create | 결과: create task id=13 ---"
    prompts: [intent]
    assert:
      - type: is-json
      - type: javascript
        value: |
          const o = JSON.parse(output);
          return o.action === 'update' && o.target === 'task' && o.id === 13;

  ## 히스토리 참조 - 이전 create 결과의 id를 이어받아 delete
  - description: "[intent-history] 그거 삭제 → delete + id 참조"
    vars:
      userMessage: "그거 삭제해줘"
      history: "--- 히스토리 #1 | 질문: 로그인 태스크 만들어줘 | target: task | action: create | 결과: create task id=13 ---"
    prompts: [intent]
    assert:
      - type: is-json
      - type: javascript
        value: |
          const o = JSON.parse(output);
          return o.action === 'delete' && o.target === 'task' && o.id === 13;

  ## 히스토리 참조 - read 결과에서 target 이어받기
  - description: "[intent-history] 그중에 진행중인 것만 → read + target 이어받기"
    vars:
      userMessage: "그중에 진행중인 것만"
      history: "--- 히스토리 #1 | 질문: 내 태스크 보여줘 | target: task | action: read | 결과: read task 5건 ---"
    prompts: [intent]
    assert:
      - type: is-json
      - type: javascript
        value: |
          const o = JSON.parse(output);
          return o.action === 'read' && o.target === 'task';

  ## 히스토리 참조 - 업무 그룹 read 후 태스크 create
  - description: "[intent-history] 거기에 태스크 추가 → create task + epic hint"
    vars:
      userMessage: "거기에 태스크 추가해줘"
      history: "--- 히스토리 #1 | 질문: 백엔드 업무 그룹 보여줘 | target: epic | action: read | 결과: read epic 3건 ---"
    prompts: [intent]
    assert:
      - type: is-json
      - type: javascript
        value: |
          const o = JSON.parse(output);
          return o.action === 'create' && o.target === 'task';

  # ──────────────────────────────────────
  # system-prompt tests (fixture: 스마트팩토리/모바일POS/사내포털)
  # ──────────────────────────────────────

  ## review_request - exact match (유일한 태스크)
  - description: "[system] MQTT 브로커 설정 완료 → review_request id=1001"
    vars:
      userMessage: "MQTT 브로커 설정 완료"
      intent: '{"action":"review_request","target":"task"}'
    prompts: [system]
    assert:
      - type: is-json
      - type: javascript
        value: |
          const arr = JSON.parse(output);
          const o = arr[0];
          return o.action === 'review_request' && o.target === 'task' && o.id === 1001;

  ## review_request - ambiguous (동명 태스크: 리포트 생성 3개 — 1012, 1087, 2015)
  - description: "[system] 리포트 생성 완료 → missing_fields (동명)"
    vars:
      userMessage: "리포트 생성 완료"
      intent: '{"action":"review_request","target":"task"}'
    prompts: [system]
    assert:
      - type: is-json
      - type: javascript
        value: |
          const arr = JSON.parse(output);
          const o = arr[0];
          return o.action === 'review_request' && o.missing_fields && o.missing_fields.includes('id')
            && o.candidates && o.candidates.length >= 2;

  ## read
  - description: "[system] 내 태스크 조회 → assignee_id=3"
    vars:
      userMessage: "내 태스크 보여줘"
      intent: '{"action":"read","target":"task"}'
    prompts: [system]
    assert:
      - type: is-json
      - type: javascript
        value: |
          const arr = JSON.parse(output);
          const o = arr[0];
          return o.action === 'read' && o.target === 'task' && o.filters && o.filters.assignee_id === 3;

  ## read review
  - description: "[system] 리뷰할거 → read review"
    vars:
      userMessage: "리뷰할거 보여줘"
      intent: '{"action":"read","target":"review"}'
    prompts: [system]
    assert:
      - type: is-json
      - type: javascript
        value: |
          const arr = JSON.parse(output);
          const o = arr[0];
          return o.action === 'read' && o.target === 'review';

  ## create - FK auto-fill (결제 모듈은 유일)
  - description: "[system] 결제 모듈에 태스크 추가 → epic_id=201"
    vars:
      userMessage: "결제 모듈에 PG사 연동 추가해줘"
      intent: '{"action":"create","target":"task","epic":"결제 모듈","name":"PG사 연동"}'
    prompts: [system]
    assert:
      - type: is-json
      - type: javascript
        value: |
          const arr = JSON.parse(output);
          const o = arr[0];
          return o.action === 'create' && o.target === 'task' && o.epic_id === 201 && o.name === 'PG사 연동';

  ## update - exact match
  - description: "[system] 카드 결제 연동 90% → update id=2001"
    vars:
      userMessage: "카드 결제 연동 90%"
      intent: '{"action":"update","target":"task"}'
    prompts: [system]
    assert:
      - type: is-json
      - type: javascript
        value: |
          const arr = JSON.parse(output);
          const o = arr[0];
          return o.action === 'update' && o.id === 2001 && o.progress === 90;

  ## delete
  - description: "[system] 바코드 생성 삭제 → delete id=2009"
    vars:
      userMessage: "바코드 생성 삭제해줘"
      intent: '{"action":"delete","target":"task"}'
    prompts: [system]
    assert:
      - type: is-json
      - type: javascript
        value: |
          const arr = JSON.parse(output);
          const o = arr[0];
          return o.action === 'delete' && o.target === 'task' && o.id === 2009;

  ## update without target
  - description: "[system] 태스크 수정해줘 → missing_fields"
    vars:
      userMessage: "태스크 수정해줘"
      intent: '{"action":"update","target":"task"}'
    prompts: [system]
    assert:
      - type: is-json
      - type: javascript
        value: |
          const arr = JSON.parse(output);
          const o = arr[0];
          return o.action === 'update' && o.missing_fields && o.missing_fields.includes('id');

  ## assign
  - description: "[system] 센서 연동 업무 그룹에 김민지 할당 → assign"
    vars:
      userMessage: "센서 연동 업무 그룹에 김민지 할당해줘"
      intent: '{"action":"assign","target":"epic"}'
    prompts: [system]
    assert:
      - type: is-json
      - type: javascript
        value: |
          const arr = JSON.parse(output);
          const o = arr[0];
          return o.action === 'assign' && o.target === 'epic' && o.id === 101 && o.user_ids && o.user_ids.includes(4);

  ## create - 이름 없이 생성
  - description: "[system] 업무 그룹 만들어줘 → create, name 없음"
    vars:
      userMessage: "업무 그룹 만들어줘"
      intent: '{"action":"create","target":"epic"}'
    prompts: [system]
    assert:
      - type: is-json
      - type: javascript
        value: |
          const arr = JSON.parse(output);
          const o = arr[0];
          return o.action === 'create' && o.target === 'epic' && !o.name;

  ## create - 동명 업무 그룹 FK (대시보드가 2개: 102, 202)
  - description: "[system] 대시보드에 태스크 추가 → epic_id는 102 또는 202"
    vars:
      userMessage: "대시보드에 태스크 추가해줘"
      intent: '{"action":"create","target":"task","epic":"대시보드"}'
    prompts: [system]
    assert:
      - type: is-json
      - type: javascript
        value: |
          const arr = JSON.parse(output);
          const o = arr[0];
          return o.action === 'create' && o.target === 'task' && (!o.epic_id || o.epic_id === 102 || o.epic_id === 202);

  ## update - 날짜 변환
  - description: "[system] 데이터 파싱 모듈 마감일 4월 25일 → date"
    vars:
      userMessage: "데이터 파싱 모듈 마감일 4월 25일로 변경"
      intent: '{"action":"update","target":"task"}'
    prompts: [system]
    assert:
      - type: is-json
      - type: javascript
        value: |
          const arr = JSON.parse(output);
          const o = arr[0];
          return o.action === 'update' && o.id === 1002 && o.due_date === '2026-04-25';

  ## update - 상태 매핑 (시작 → IN_PROGRESS + progress=10)
  - description: "[system] 영수증 출력 시작 → IN_PROGRESS, progress=10"
    vars:
      userMessage: "영수증 출력 시작"
      intent: '{"action":"update","target":"task"}'
    prompts: [system]
    assert:
      - type: is-json
      - type: javascript
        value: |
          const arr = JSON.parse(output);
          const o = arr[0];
          return o.action === 'update' && o.id === 2002 && o.status === 'IN_PROGRESS' && o.progress === 10;

  ## review_request - 대상 미지정
  - description: "[system] 리뷰 요청해줘 → missing_fields"
    vars:
      userMessage: "리뷰 요청해줘"
      intent: '{"action":"review_request","target":"task"}'
    prompts: [system]
    assert:
      - type: is-json
      - type: javascript
        value: |
          const arr = JSON.parse(output);
          const o = arr[0];
          return o.action === 'review_request' && o.missing_fields && o.missing_fields.includes('id');

  ## read - 기간 표현은 due_date_from+to 쌍으로 (from 누락 시 과거 마감까지 조회되는 회귀 방지)
  - description: "[system] 이번주 마감 프로젝트 → due_date_from~to 범위"
    vars:
      userMessage: "이번주 마감인 프로젝트 보여줘"
      intent: '{"action":"read","target":"project"}'
    prompts: [system]
    assert:
      - type: is-json
      - type: javascript
        value: |
          const arr = JSON.parse(output);
          const o = arr[0];
          const f = o.filters || {};
          return o.action === 'read' && o.target === 'project'
            && f.due_date_from === '2026-04-13' && f.due_date_to === '2026-04-19';

  ## read - 필터 조합 (프로젝트 + 상태)
  - description: "[system] 스마트팩토리 진행중인 태스크 → filters"
    vars:
      userMessage: "스마트팩토리 진행중인 태스크 보여줘"
      intent: '{"action":"read","target":"task"}'
    prompts: [system]
    assert:
      - type: is-json
      - type: javascript
        value: |
          const arr = JSON.parse(output);
          const o = arr[0];
          return o.action === 'read' && o.filters && o.filters.project_id === 1 && o.filters.status === 'IN_PROGRESS';

  ## create - 프로젝트 지정 업무 그룹 생성
  - description: "[system] 모바일 POS에 배송 업무 그룹 추가 → project_id=2"
    vars:
      userMessage: "모바일 POS에 배송 업무 그룹 추가해줘"
      intent: '{"action":"create","target":"epic","project":"모바일 POS","name":"배송"}'
    prompts: [system]
    assert:
      - type: is-json
      - type: javascript
        value: |
          const arr = JSON.parse(output);
          const o = arr[0];
          return o.action === 'create' && o.target === 'epic' && o.project_id === 2 && o.name === '배송';

  ## not found - CONTEXT에 없는 항목은 clarify + 다음 행동 안내
  - description: "[system] CONTEXT에 없는 항목 → clarify"
