server:
  servlet:
    context-path: /api

spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 1000
  application:
    name: weekly-report
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/weekly_report
    username: ${DB_USERNAME:pluxity}
    password: ${DB_PASSWORD:pluxity0304}

llm:
  ollama:
    base-url: ${OLLAMA_URL:}
    model: ${OLLAMA_MODEL:}
  openrouter:
    api-key: ${OPENROUTER_API_KEY:}
    model: ${OPENROUTER_MODEL:}
  temperature: 0.1
  timeout-ms: 60000

teams:
  app-id: ${TEAMS_APP_ID:}
  app-password: ${TEAMS_APP_PASSWORD:}

domain:
  url: ${API_URL:}

