spring:
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 1000
  application:
    name: core
  datasource:
    url: jdbc:postgresql://localhost:5432/weekly_report
    username: pluxity
    password: pluxity0304
    driver-class-name: org.postgresql.Driver

llm:
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:}
  ollama:
    base-url: ${OLLAMA_URL}
    model: ${OLLAMA_MODEL}
  openrouter:
    api-key: ${OPENROUTER_API_KEY:}
    model: ${OPENROUTER_MODEL:}
  temperature: 0.1
  timeout-ms: 60000

file:
  storage-strategy: ${FILE_STORAGE_STRATEGY:s3}
  local:
    path: ${FILE_LOCAL_PATH:/app/upload}
  s3:
    endpoint-url: ${S3_ENDPOINT_URL:http://minio:9000}
    public-url: ${S3_PUBLIC_URL:http://localhost/files}
    bucket: ${S3_BUCKET:plug-platform}
    region: ${S3_REGION:ap-northeast-2}
    access-key: ${S3_ACCESS_KEY:pluxity}
    secret-key: ${S3_SECRET_KEY:pluxity0304}
    pre-signed-url-expiration: 600

teams:
  app-id: ${TEAMS_APP_ID:}
  app-password: ${TEAMS_APP_PASSWORD:}

domain:
  url: ${API_URL:http://localhost:8080}

logging:
  level:
    com: DEBUG

